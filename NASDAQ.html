<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בורסת הילדים 💰</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--card:#151e2e;--card2:#1c2840;
  --border:#2a3a55;--accent:#00e5ff;--accent2:#7c3aed;--green:#00ff88;
  --red:#ff3366;--yellow:#ffd700;--orange:#ff8c00;
  --text:#e8f0fe;--text2:#8899bb;--text3:#4a5a7a;
  --radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

/* SCREENS */
.screen{display:none !important;position:relative;z-index:1;animation:fadeIn 0.4s ease;}
.screen.active{display:block !important;}
#setup-screen.active{display:flex !important;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SETUP */
#setup-screen{min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;}
.logo{text-align:center;margin-bottom:40px;}
.logo h1{font-size:clamp(2.2rem,6vw,4rem);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
.logo p{color:var(--text2);font-size:1.1rem;margin-top:8px;}
.setup-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:100%;max-width:580px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.section-title{font-size:0.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
.input-group{margin-bottom:18px;}
.input-group label{display:block;font-size:0.88rem;color:var(--text2);margin-bottom:7px;font-weight:500;}
.input-group input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-family:'Heebo',sans-serif;font-size:1rem;transition:border-color .2s,box-shadow .2s;text-align:right;}
.input-group input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,0.1);}
.players-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.player-row{display:flex;gap:10px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.player-row input{flex:1;background:transparent;border:none;color:var(--text);font-family:'Heebo',sans-serif;font-size:1rem;text-align:right;}
.player-row input:focus{outline:none;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'Heebo',sans-serif;font-size:0.95rem;font-weight:700;transition:all .2s;text-decoration:none;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#0099bb);color:#000;box-shadow:0 4px 20px rgba(0,229,255,0.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,229,255,0.4);}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:rgba(255,51,102,0.15);color:var(--red);border:1px solid rgba(255,51,102,0.3);}
.btn-danger:hover{background:rgba(255,51,102,0.25);}
.btn-success{background:linear-gradient(135deg,var(--green),#00aa55);color:#000;box-shadow:0 4px 20px rgba(0,255,136,0.3);}
.btn-success:hover{transform:translateY(-2px);}
.btn-sm{padding:7px 14px;font-size:0.82rem;}
.btn-icon{width:34px;height:34px;padding:0;border-radius:50%;font-size:1rem;background:rgba(255,51,102,0.15);color:var(--red);border:1px solid rgba(255,51,102,0.3);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none !important;}
.full-w{width:100%;}
.mt-16{margin-top:16px;}.mb-16{margin-bottom:16px;}
.flex{display:flex;}.flex-center{align-items:center;justify-content:center;}.gap-10{gap:10px;}

/* GAME HEADER */
.game-header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);flex-wrap:wrap;gap:8px;}
.game-title{font-weight:800;font-size:1.15rem;color:var(--accent);}
.day-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:0.82rem;color:var(--text2);}
.day-badge span{color:var(--yellow);font-weight:700;font-family:'Space Mono',monospace;}
#header-player-cash{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:7px 16px;}
#header-player-name{color:var(--text2);font-weight:700;font-size:0.78rem;}
#header-cash-value{font-family:'Space Mono',monospace;font-weight:800;font-size:1.05rem;color:var(--green);text-shadow:0 0 12px rgba(0,255,136,0.4);}

/* TICKER */
.news-ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 0;overflow:hidden;}
.news-ticker{display:flex;gap:50px;animation:ticker 40s linear infinite;white-space:nowrap;width:max-content;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.news-item{font-size:0.78rem;color:var(--text2);padding:0 10px;}
.news-item strong{color:var(--text);}
.news-item .up{color:var(--green);}.news-item .down{color:var(--red);}

/* PLAYER TABS */
.player-tabs{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 14px;}
.player-tab{padding:12px 18px;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;font-weight:600;font-size:0.86rem;color:var(--text2);transition:all .2s;display:flex;align-items:center;gap:7px;}
.player-tab:hover{color:var(--text);}
.player-tab.active{border-bottom-color:var(--accent);color:var(--accent);}
.player-tab.done-tab{opacity:.6;}
.tab-value{font-family:'Space Mono',monospace;font-size:0.72rem;background:var(--bg3);padding:2px 7px;border-radius:10px;}
.tab-done{font-size:0.75rem;color:var(--green) !important;}

/* GAME MAIN */
.game-main{display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 115px);}

/* SIDEBAR */
.sidebar{background:var(--card);border-left:1px solid var(--border);padding:18px;overflow-y:auto;}
.player-profile{text-align:center;padding-bottom:18px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.player-avatar-big{font-size:2.8rem;margin-bottom:6px;}
.player-name-big{font-size:1.2rem;font-weight:800;}
.player-cash{font-family:'Space Mono',monospace;font-size:1.5rem;font-weight:700;color:var(--green);margin:4px 0;}
.player-cash-label{font-size:0.72rem;color:var(--text2);}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bg3);font-size:0.83rem;}
.stat-label{color:var(--text2);}
.stat-val{font-family:'Space Mono',monospace;font-weight:700;}
.stat-val.green{color:var(--green);}.stat-val.red{color:var(--red);}.stat-val.yellow{color:var(--yellow);}
.div-meter-wrap{margin-top:18px;}
.div-meter-bar{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:7px 0;}
.div-meter-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.sidebar-actions{margin-top:18px;display:flex;flex-direction:column;gap:9px;}
.quest-card{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(124,58,237,.05));border:1px solid rgba(124,58,237,.4);border-radius:var(--radius-sm);padding:12px;margin-top:14px;}
.quest-title{font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-bottom:5px;font-weight:700;}
.quest-desc{font-size:0.82rem;color:var(--text);margin-bottom:6px;}
.quest-reward{font-size:0.78rem;color:var(--yellow);}
.portfolio-list{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.port-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;font-size:0.78rem;}
.port-item-top{display:flex;justify-content:space-between;font-weight:700;}
.port-item-bot{display:flex;justify-content:space-between;margin-top:2px;color:var(--text2);}
.savings-card{background:linear-gradient(135deg,rgba(0,229,255,.1),rgba(0,229,255,.03));border:1px solid rgba(0,229,255,.3);border-radius:var(--radius-sm);padding:11px;margin-top:9px;}
.savings-label{font-size:0.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:5px;font-weight:700;}
.savings-amount{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--accent);}
.savings-info{font-size:0.72rem;color:var(--text2);margin-top:2px;}

/* MARKET */
.market-area{padding:18px;overflow-y:auto;}
.market-search{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.market-search input{flex:1;min-width:160px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 13px;color:var(--text);font-family:'Heebo',sans-serif;font-size:0.88rem;text-align:right;}
.market-search input:focus{outline:none;border-color:var(--accent);}
.filter-pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:0.77rem;cursor:pointer;background:var(--bg2);color:var(--text2);transition:all .2s;}
.pill.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
.pill:hover:not(.active){border-color:var(--accent);color:var(--accent);}
.stocks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px;}

/* STOCK CARD */
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:15px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.stock-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .2s;}
.stock-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 10px 40px rgba(0,0,0,.4);}
.stock-card:hover::before{opacity:1;}
.stock-card.owned{border-color:rgba(0,255,136,.4);}
.stock-card.owned::before{opacity:1;background:linear-gradient(90deg,transparent,var(--green),transparent);}
.stock-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.stock-logo-wrap{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:white;border-radius:8px;overflow:hidden;padding:4px;}
.stock-logo-wrap img{width:100%;height:100%;object-fit:contain;}
.stock-emoji-fallback{font-size:2rem;width:48px;height:48px;display:flex;align-items:center;justify-content:center;}
.stock-name{font-weight:800;font-size:0.92rem;margin-bottom:2px;}
.stock-category{font-size:0.68rem;color:var(--text2);}
.stock-risk{font-size:0.62rem;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:1px;}
.risk-stable{background:rgba(0,255,136,.15);color:var(--green);}
.risk-volatile{background:rgba(255,140,0,.15);color:var(--orange);}
.risk-very-volatile{background:rgba(255,51,102,.15);color:var(--red);}
.stock-price-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.stock-price{font-family:'Space Mono',monospace;font-size:1.2rem;font-weight:700;}
.stock-change{font-family:'Space Mono',monospace;font-size:0.82rem;font-weight:700;padding:3px 9px;border-radius:7px;}
.change-up{background:rgba(0,255,136,.15);color:var(--green);}
.change-down{background:rgba(255,51,102,.15);color:var(--red);}
.change-neutral{background:rgba(255,215,0,.1);color:var(--yellow);}
.mini-chart{height:38px;position:relative;margin-bottom:9px;}
.mini-chart canvas{width:100% !important;height:38px !important;}
.stock-owned-badge{font-size:0.72rem;color:var(--green);margin-bottom:7px;display:flex;align-items:center;gap:3px;}
.stock-actions{display:flex;gap:7px;}
.buy-btn{flex:1;padding:7px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);border-radius:7px;color:var(--green);font-family:'Heebo',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;transition:all .2s;}
.buy-btn:hover{background:rgba(0,255,136,.2);}
.sell-btn{flex:1;padding:7px;background:rgba(255,51,102,.1);border:1px solid rgba(255,51,102,.3);border-radius:7px;color:var(--red);font-family:'Heebo',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;transition:all .2s;}
.sell-btn:hover{background:rgba(255,51,102,.2);}
.sell-btn:disabled{opacity:.3;cursor:not-allowed;}
@keyframes flashGreen{0%,100%{background:var(--card)}50%{background:rgba(0,255,136,.2)}}
@keyframes flashRed{0%,100%{background:var(--card)}50%{background:rgba(255,51,102,.2)}}
.flash-green{animation:flashGreen .6s ease;}
.flash-red{animation:flashRed .6s ease;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:26px;max-width:480px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.7);animation:modalIn .3s ease;max-height:92vh;overflow-y:auto;}
@keyframes modalIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.modal h2{font-size:1.3rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:9px;}
.modal-info{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px;}
.modal-info .row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bg3);font-size:0.88rem;}
.modal-info .row:last-child{border:none;}
.qty-control{display:flex;align-items:center;gap:11px;margin:14px 0;}
.qty-btn{width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:1.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.qty-btn:hover{border-color:var(--accent);color:var(--accent);}
.qty-display{font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;flex:1;text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;}
.total-cost{font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;text-align:center;padding:9px;border-radius:var(--radius-sm);background:var(--bg2);border:1px solid var(--border);margin-bottom:14px;}
.tax-notice{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:var(--radius-sm);padding:9px 13px;font-size:0.78rem;color:var(--yellow);margin-bottom:14px;}

/* SUMMARY */
#summary-screen{min-height:100vh;padding:26px 18px;max-width:980px;margin:0 auto;}
.summary-header{text-align:center;margin-bottom:26px;}
.summary-header h1{font-size:1.9rem;font-weight:900;}
.summary-header p{color:var(--text2);margin-top:5px;}
.news-event-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:26px;}
.news-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;display:flex;align-items:center;gap:14px;}
.news-card .news-icon{font-size:1.9rem;}
.news-card .news-body{flex:1;}
.news-card .news-headline{font-weight:700;margin-bottom:3px;}
.news-card .news-effect{font-size:0.82rem;color:var(--text2);}
.news-card .news-future{font-size:0.72rem;color:var(--accent2);margin-top:3px;}
.news-card .news-pct{font-family:'Space Mono',monospace;font-weight:700;font-size:1.05rem;}

/* STOCKS RANKING TABLE in summary */
.stocks-ranking{display:flex;flex-direction:column;gap:6px;margin-bottom:26px;}
.sr-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;}
.sr-logo{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:white;border-radius:6px;overflow:hidden;padding:3px;flex-shrink:0;}
.sr-logo img{width:100%;height:100%;object-fit:contain;}
.sr-emoji{font-size:1.5rem;width:36px;text-align:center;flex-shrink:0;}
.sr-name{font-weight:700;font-size:0.88rem;flex:1;}
.sr-price{font-family:'Space Mono',monospace;font-size:0.88rem;color:var(--text2);}
.sr-change{font-family:'Space Mono',monospace;font-size:0.88rem;font-weight:700;padding:3px 9px;border-radius:6px;min-width:70px;text-align:center;}

/* PLAYER SUMMARY CARDS */
.players-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:26px;}
.player-summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;}
.player-summary-card.mvp{border-color:var(--yellow);box-shadow:0 0 30px rgba(255,215,0,.2);}
.mvp-badge{position:absolute;top:10px;left:10px;background:var(--yellow);color:#000;font-size:0.62rem;font-weight:800;padding:2px 7px;border-radius:10px;letter-spacing:1px;}
.ps-avatar{font-size:2.3rem;margin-bottom:7px;}
.ps-name{font-size:1.05rem;font-weight:800;margin-bottom:3px;}
.ps-total{font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--accent);margin-bottom:7px;}
.ps-change{font-family:'Space Mono',monospace;font-size:0.86rem;font-weight:700;padding:3px 9px;border-radius:7px;display:inline-block;margin-bottom:10px;}
.ps-breakdown{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.ps-breakdown-row{display:flex;justify-content:space-between;font-size:0.78rem;}
.ps-breakdown-row span:first-child{color:var(--text2);}
.ps-breakdown-row span:last-child{font-family:'Space Mono',monospace;font-weight:700;}
.actions-log{list-style:none;}
.action-item{padding:5px 0;border-bottom:1px solid var(--bg3);font-size:0.77rem;color:var(--text2);display:flex;justify-content:space-between;}
.action-item:last-child{border:none;}
.alist-val{font-family:'Space Mono',monospace;font-size:0.72rem;}
.fomo-tag{margin-top:9px;background:rgba(255,140,0,.15);border:1px solid rgba(255,140,0,.3);border-radius:var(--radius-sm);padding:7px 11px;font-size:0.75rem;color:var(--orange);}
.leaderboard-section{margin-bottom:26px;}
.leaderboard-row{display:flex;align-items:center;gap:13px;padding:11px 15px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:7px;transition:all .2s;}
.leaderboard-row:hover{border-color:var(--accent);}
.rank-num{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--text3);width:28px;text-align:center;}
.rank-num.gold{color:var(--yellow);}.rank-num.silver{color:#aaa;}.rank-num.bronze{color:#cd7f32;}
.lb-av{font-size:1.7rem;}
.lb-name{font-weight:700;flex:1;}
.lb-val{font-family:'Space Mono',monospace;font-size:0.95rem;font-weight:700;}

/* END SCREEN */
#end-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 18px;text-align:center;}
.winner-trophy{font-size:5.5rem;animation:bounce 1s ease infinite alternate;}
@keyframes bounce{to{transform:translateY(-14px)}}
#end-screen h1{font-size:2.3rem;font-weight:900;margin:18px 0 9px;}
#end-screen p{color:var(--text2);font-size:1.05rem;margin-bottom:26px;}
.end-leaderboard{width:100%;max-width:500px;}

/* TOAST */
#toast-container{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column-reverse;gap:7px;pointer-events:none;}
.toast{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 18px;font-size:0.88rem;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;max-width:420px;text-align:center;}
.toast.green{border-color:rgba(0,255,136,.5);color:var(--green);}
.toast.red{border-color:rgba(255,51,102,.5);color:var(--red);}
.toast.yellow{border-color:rgba(255,215,0,.5);color:var(--yellow);}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-10px)}}

/* MISC */
hr.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
.text-center{text-align:center;}.text-muted{color:var(--text2);font-size:0.83rem;}
.mono{font-family:'Space Mono',monospace;}
.tag{display:inline-block;font-size:0.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border-radius:4px;}
.tag-cat{background:rgba(124,58,237,.2);color:#a78bfa;}
.badge-green{background:rgba(0,255,136,.15);color:var(--green);display:inline-block;padding:2px 9px;border-radius:10px;font-size:0.68rem;font-weight:700;}
.badge-red{background:rgba(255,51,102,.15);color:var(--red);display:inline-block;padding:2px 9px;border-radius:10px;font-size:0.68rem;font-weight:700;}
.badge-yellow{background:rgba(255,215,0,.15);color:var(--yellow);display:inline-block;padding:2px 9px;border-radius:10px;font-size:0.68rem;font-weight:700;}
.badge-blue{background:rgba(0,229,255,.15);color:var(--accent);display:inline-block;padding:2px 9px;border-radius:10px;font-size:0.68rem;font-weight:700;}

/* RESPONSIVE */
@media(max-width:900px){
  .game-main{grid-template-columns:1fr;}
  .sidebar{border-left:none;border-bottom:1px solid var(--border);max-height:none;}
  .stocks-grid{grid-template-columns:1fr;}
  .game-header{padding:9px 13px;}
  .game-title{font-size:0.95rem;}
  #header-player-cash{font-size:0.78rem;padding:5px 11px;}
  .player-tabs{padding:0 7px;}
  .player-tab{padding:9px 11px;font-size:0.78rem;}
  .market-area{padding:11px;}
  .setup-card{padding:18px 15px;}
  .players-summary-grid{grid-template-columns:1fr;}
}
</style>

<!-- SETUP SCREEN -->
<div id="setup-screen" class="screen active">
  <div class="logo">
    <h1>💹 בורסת הילדים</h1>
    <p>למד להשקיע, לנהל כסף, ולהתעשר! 🚀</p>
  </div>
  <div class="setup-card">
    <div class="section-title">⚙️ הגדרות משחק</div>
    <div class="input-group">
      <label>כמות כסף התחלתית לכל שחקן (₪)</label>
      <input type="number" id="start-cash" value="10000" min="1000" max="100000" step="1000">
    </div>
    <div class="input-group">
      <label>מספר סיבובים (ימי עסקים)</label>
      <input type="number" id="num-rounds" value="10" min="3" max="30">
    </div>
    <hr class="divider">
    <div class="section-title">👥 שחקנים</div>
    <div class="players-list" id="players-list"></div>
    <button class="btn btn-secondary btn-sm" onclick="addPlayer()">➕ הוסף שחקן</button>
    <hr class="divider">
    <div style="display:flex;gap:9px;flex-wrap:wrap;">
      <button class="btn btn-primary full-w" onclick="startGame()">🚀 התחל משחק!</button>
      <button class="btn btn-secondary btn-sm" onclick="loadGame()" id="load-btn" style="display:none">📂 המשך משחק שמור</button>
    </div>
    <button class="btn btn-danger btn-sm mt-16 full-w" onclick="resetSave()" id="reset-btn" style="display:none">🗑️ מחק שמירה</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="game-title">💹 בורסת הילדים</div>
    <div id="header-player-cash">
      <span id="header-player-avatar" style="font-size:1.35rem"></span>

        <span id="header-player-name"></span>
        <span style="color:var(--text3);font-size:0.62rem;letter-spacing:1px">מזומן זמין לרכישות</span>
      </div>
      <span id="header-cash-value"></span>
    </div>
    <div class="day-badge">יום: <span id="current-day-label">1</span></div>
    <button class="btn btn-secondary btn-sm" onclick="endTurn()">✅ סיים תור</button>
  </div>
  <div class="news-ticker-wrap">
    <div class="news-ticker" id="news-ticker"><span class="news-item">⏳ טוען חדשות...</span></div>
  </div>
  <div class="player-tabs" id="player-tabs"></div>
  <div class="game-main">
    <div class="sidebar" id="sidebar">
      <div class="player-profile" id="player-profile"></div>
      <div id="portfolio-section"></div>
      <div id="sidebar-features"></div>
      <div id="quest-section"></div>
      <div class="sidebar-actions" id="sidebar-actions"></div>
    </div>
    <div class="market-area">
      <div class="market-search">
        <input type="text" id="search-input" placeholder="🔍 חפש חברה..." oninput="filterStocks()">
        <div class="filter-pills" id="filter-pills"></div>
      </div>
      <div class="stocks-grid" id="stocks-grid"></div>
    </div>
  </div>
</div>

<!-- SUMMARY SCREEN -->
<div id="summary-screen" class="screen">
  <div style="max-width:1100px;margin:0 auto;padding:26px 18px;">
    <div class="summary-header">
      <h1 id="summary-title">📰 סיכום יום עסקים</h1>
      <p id="summary-subtitle"></p>
    </div>
    <div class="section-title">📰 חדשות שהשפיעו על השוק היום</div>
    <div class="news-event-cards" id="summary-news"></div>
    <hr class="divider">
    <div class="section-title">📊 כל המניות — ממוין לפי שינוי יומי</div>

    <hr class="divider">
    <div class="section-title">🏆 טבלת מובילים</div>
    <div class="leaderboard-section" id="leaderboard"></div>
    <hr class="divider">
    <div class="section-title">👤 סיכום מפורט — כל שחקן</div>
    <div class="players-summary-grid" id="players-summary"></div>
    <div class="text-center mt-16 mb-16">

    </div>
  </div>
</div>

<!-- END SCREEN -->
<div id="end-screen" class="screen">
  <div class="winner-trophy" id="winner-trophy">🏆</div>
  <h1 id="end-title">המשחק הסתיים!</h1>

  <div class="end-leaderboard" id="end-leaderboard"></div>
  <button class="btn btn-primary mt-16" onclick="goToSetup()">🔄 משחק חדש</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal(event)">

</div>

const AVATARS = ['😎','🦸','🧠','🦊','🐯','🦁','🐧','🦅','🐬','🎩','👑','🤖'];

// ============================================================
// GAME STATE
// ============================================================
let G = {
  players:[],round:1,totalRounds:10,startCash:10000,
  stocks:{},priceHistory:{},stockPrevPrices:{},
  currentPlayer:0,donePlayers:[],
  roundNews:[],futureNews:[], // futureNews: [{news, triggerRound}]
  roundActions:{},phase:'playing',
  lastRoundPrices:{}, // prices at start of round for % calc
};

function totalValue(player,gs){
  let v=player.cash;
  player.portfolio.forEach(h=>{v+=h.qty*(gs.stocks[h.id]||0);});
  v+=player.savings;
  v-=player.loanAmount;
  return v;
}

// ============================================================
// SETUP
// ============================================================
let playerCount=0;
function addPlayer(){
  const avatar=AVATARS[playerCount%AVATARS.length];
  playerCount++;
  const num=playerCount;
  const id='p'+num;
  const div=document.createElement('div');
  div.className='player-row';
  div.id='player-row-'+id;
  const span=document.createElement('span');
  span.style.fontSize='1.5rem';
  span.textContent=avatar;
  const inp=document.createElement('input');
  inp.type='text';
  inp.placeholder='שם שחקן '+num;
  inp.value='שחקן '+num;
  inp.style.cssText='flex:1;background:transparent;border:none;color:var(--text);font-family:Heebo,sans-serif;font-size:1rem;text-align:right;';
  const btn=document.createElement('button');
  btn.className='btn btn-icon';
  btn.textContent='✕';
  btn.onclick=()=>removePlayer(id);
  div.appendChild(span);
  div.appendChild(inp);
  div.appendChild(btn);
  document.getElementById('players-list').appendChild(div);
}

function removePlayer(id){const el=document.getElementById('player-row-'+id);if(el)el.remove();}

function startGame(){
  const rows=document.querySelectorAll('.player-row');
  if(rows.length<1){showToast('הוסף לפחות שחקן אחד!','red');return;}
  const cash=parseInt(document.getElementById('start-cash').value)||10000;
  const rounds=parseInt(document.getElementById('num-rounds').value)||10;
  const players=[];
  rows.forEach((row,i)=>{
    const inp=row.querySelector('input[type="text"]');
    const name=inp?inp.value.trim()||('שחקן '+(i+1)):'שחקן '+(i+1);
    const av=row.querySelector('span');
    const avatar=av?av.textContent:AVATARS[i%AVATARS.length];
    players.push({id:'p'+(i+1),name,avatar,cash,portfolio:[],savings:0,savingsRoundsLeft:0,loanAmount:0,hasInsurance:false,hasNewsSub:false,newsSubMonthly:false,soldThisRound:false,quest:null,questDone:false,totalValueHistory:[cash]});
  });
  G.players=players;G.round=1;G.totalRounds=rounds;G.startCash=cash;
  G.currentPlayer=0;G.donePlayers=[];G.roundActions={};G.futureNews=[];
  players.forEach(p=>{G.roundActions[p.id]=[];});
  COMPANIES.forEach(c=>{G.stocks[c.id]=c.basePrice;G.priceHistory[c.id]=[c.basePrice];G.lastRoundPrices[c.id]=c.basePrice;});
  assignQuests();G.phase='playing';
  saveGame();showGameScreen();
}

function assignQuests(){
  const shuffled=[...QUESTS].sort(()=>Math.random()-.5);
  G.players.forEach((p,i)=>{p.quest=shuffled[i%shuffled.length];p.questDone=false;});
}

// SAVE / LOAD
function saveGame(){try{localStorage.setItem('borsa_save',JSON.stringify(G));}catch(e){}}
function loadGame(){
  const raw=localStorage.getItem('borsa_save');if(!raw)return;
  G=JSON.parse(raw);
  G.players.forEach(p=>{if(p.quest){const m=QUESTS.find(q=>q.desc===p.quest.desc);if(m)p.quest=m;}});
  if(G.phase==='playing')showGameScreen();
  else if(G.phase==='summary')showSummaryScreen();
  else showEndScreen();
}
function resetSave(){if(!confirm('בטוח?'))return;localStorage.removeItem('borsa_save');location.reload();}

// SCREENS
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
}
function showGameScreen(){showScreen('game-screen');document.getElementById('current-day-label').textContent=G.round;renderPlayerTabs();renderSidebar();renderStocks();updateNewsTicker();}
function showSummaryScreen(){G.phase='summary';showScreen('summary-screen');renderSummary();}
function showEndScreen(){G.phase='end';showScreen('end-screen');renderEnd();}
function goToSetup(){localStorage.removeItem('borsa_save');location.reload();}

// GAME SCREEN
// ============================================================
function updateHeaderCash(){
  const p=G.players[G.currentPlayer];if(!p)return;
  const av=document.getElementById('header-player-avatar');
  const nm=document.getElementById('header-player-name');
  const cv=document.getElementById('header-cash-value');
  if(av)av.textContent=p.avatar;
  if(nm)nm.textContent=p.name;
  if(cv)cv.textContent='₪'+fmt(p.cash);
}

function renderPlayerTabs(){
  const container=document.getElementById('player-tabs');container.innerHTML='';
  G.players.forEach((p,i)=>{
    const done=G.donePlayers.includes(p.id);
    const tv=totalValue(p,G);
    const div=document.createElement('div');
    div.className='player-tab'+(i===G.currentPlayer?' active':'')+(done?' done-tab':'');
    div.onclick=()=>{if(!done){G.currentPlayer=i;renderSidebar();renderStocks();renderPlayerTabs();}};
    div.innerHTML=`${p.avatar} ${p.name} <span class="tab-value">₪${fmt(tv)}</span>${done?'<span class="tab-done">✓</span>':''}`;
    container.appendChild(div);
  });
}

function renderSidebar(){
  updateHeaderCash();
  const p=G.players[G.currentPlayer];if(!p)return;
  const tv=totalValue(p,G);
  const pct=(((tv-G.startCash)/G.startCash)*100).toFixed(1);
  const pClass=pct>=0?'green':'red';
  document.getElementById('player-profile').innerHTML=`
    <div class="player-avatar-big">${p.avatar}</div>
    <div class="player-name-big">${p.name}</div>
    <div class="player-cash">₪${fmt(p.cash)}</div>
    <div class="player-cash-label">מזומן זמין</div>
    <div class="stat-row mt-16"><span class="stat-label">שווי כולל</span><span class="stat-val yellow">₪${fmt(tv)}</span></div>
    <div class="stat-row"><span class="stat-label">רווח/הפסד</span><span class="stat-val ${pClass}">${pct>=0?'+':''}${pct}%</span></div>
    ${p.loanAmount>0?`<div class="stat-row"><span class="stat-label">הלוואה</span><span class="stat-val red">-₪${fmt(p.loanAmount)}</span></div>`:''}
    ${p.hasInsurance?`<div class="stat-row"><span class="stat-label">ביטוח</span><span class="stat-val green">✓</span></div>`:''}
    ${p.hasNewsSub||p.newsSubMonthly?`<div class="stat-row"><span class="stat-label">מינוי חדשות</span><span class="stat-val green">✓ פעיל</span></div>`:''}
  `;
  // Portfolio
  let portHTML=`<div style="margin-top:14px"><div class="section-title">💼 תיק מניות</div>`;
  if(!p.portfolio.length){portHTML+=`<div class="text-muted" style="margin-top:7px">אין מניות עדיין</div>`;}
  else{
    portHTML+=`<div class="portfolio-list">`;
    p.portfolio.forEach(h=>{
      const co=COMPANIES.find(c=>c.id===h.id);const cur=G.stocks[h.id];

let activeFilter='הכל';
function renderStocks(){
  const p=G.players[G.currentPlayer];
  // Pills
  const pillsEl=document.getElementById('filter-pills');
  pillsEl.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const span=document.createElement('span');
    span.className='pill'+(cat===activeFilter?' active':'');
    span.textContent=cat;
    span.onclick=()=>{activeFilter=cat;renderStocks();};
    pillsEl.appendChild(span);
  });
  const search=(document.getElementById('search-input').value||'').toLowerCase();
  const grid=document.getElementById('stocks-grid');grid.innerHTML='';
  let visible=COMPANIES;
  if(activeFilter!=='הכל')visible=visible.filter(c=>c.category===activeFilter);
  if(search)visible=visible.filter(c=>c.name.toLowerCase().includes(search)||c.category.includes(search));
  visible.forEach(company=>{
    const price=G.stocks[company.id];
    const hist=G.priceHistory[company.id]||[price];
    const prev=hist.length>=2?hist[hist.length-2]:price;
    const change=price-prev;const changePct=prev>0?((change/prev)*100).toFixed(1):'0.0';
    const holding=p.portfolio.find(h=>h.id===company.id);
    const card=document.createElement('div');
    card.className='stock-card'+(holding?' owned':'');
    card.id='card-'+company.id;
    const riskLabel={stable:'יציב',volatile:'תנודתי','very-volatile':'מסוכן'}[company.risk];
    const changeClass=change>0?'change-up':change<0?'change-down':'change-neutral';
    const changeSign=change>0?'+':'';
    const logoHTML=`<div class="stock-logo-wrap"><img src="${company.logo}" alt="${company.name}" onerror="this.parentElement.innerHTML='<div class=\\'stock-emoji-fallback\\'>${company.emoji}</div>'"></div>`;
    card.innerHTML=`
      <div class="stock-header">
        <div style="display:flex;gap:9px;align-items:flex-start">
          ${logoHTML}
          <div><div class="stock-name">${company.name}</div><div class="stock-category"><span class="tag tag-cat">${company.category}</span></div></div>
        </div>
        <span class="stock-risk risk-${company.risk}">${riskLabel}</span>
      </div>
      <div class="stock-price-row">
        <div class="stock-price">₪${fmt(price)}</div>
        <div class="stock-change ${changeClass}">${changeSign}${changePct}%</div>
      </div>
      <div class="mini-chart"><canvas id="chart-${company.id}" height="38"></canvas></div>
      ${holding?`<div class="stock-owned-badge">✓ ברשותך: ${holding.qty} מניות</div>`:''}
      <div class="stock-actions">
        <button class="buy-btn" onclick="openBuyModal('${company.id}')">קנה ▲</button>
        <button class="sell-btn" ${!holding?'disabled':''} onclick="openSellModal('${company.id}')">מכור ▼</button>
      </div>`;
    grid.appendChild(card);
    setTimeout(()=>drawMiniChart(company.id),0);
  });
}

function drawMiniChart(id){
  const canvas=document.getElementById('chart-'+id);if(!canvas)return;
  const hist=G.priceHistory[id]||[];if(hist.length<2)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth||240;canvas.height=38;
  const min=Math.min(...hist),max=Math.max(...hist),range=max-min||1;
  const w=canvas.width,h=canvas.height;
  const last=hist[hist.length-1],first=hist[0];
  const color=last>=first?'#00ff88':'#ff3366';
  ctx.clearRect(0,0,w,h);
  ctx.beginPath();
  hist.forEach((p,i)=>{
    const x=(i/(hist.length-1))*w;
    const y=h-((p-min)/range)*(h-4)-2;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
  ctx.fillStyle=color+'22';ctx.fill();
}

function buyStock(companyId,qty){
  const p=G.players[G.currentPlayer];
  const price=G.stocks[companyId];const total=qty*price;
  if(p.cash<total){showToast('אין מספיק מזומן!','red');return;}
  p.cash-=total;
  const ex=p.portfolio.find(h=>h.id===companyId);
  if(ex){ex.avgCost=((ex.avgCost*ex.qty)+(price*qty))/(ex.qty+qty);ex.qty+=qty;}
  else{p.portfolio.push({id:companyId,qty,avgCost:price});}
  const co=COMPANIES.find(c=>c.id===companyId);
  G.roundActions[p.id].push({type:'buy',company:co.name,qty,price,total});
  checkQuest(p);
  const card=document.getElementById('card-'+companyId);
  if(card){card.classList.add('flash-green');setTimeout(()=>card.classList.remove('flash-green'),600);}
  showToast(`✅ קנית ${qty} מניות של ${co.name}!`,'green');
  closeModal();saveGame();renderSidebar();renderStocks();
}

function sellStock(companyId,qty){
  const p=G.players[G.currentPlayer];
  const price=G.stocks[companyId];
  const holding=p.portfolio.find(h=>h.id===companyId);if(!holding||holding.qty<qty){showToast('אין מספיק מניות!','red');return;}
  const total=qty*price,cost=qty*holding.avgCost,profit=total-cost;
  const tax=profit>0?Math.round(profit*0.1):0,net=total-tax;
  p.cash+=net;holding.qty-=qty;
  if(holding.qty===0)p.portfolio=p.portfolio.filter(h=>h.id!==companyId);
  p.soldThisRound=true;
  const co=COMPANIES.find(c=>c.id===companyId);
  G.roundActions[p.id].push({type:'sell',company:co.name,qty,price,total,profit,tax});
  const card=document.getElementById('card-'+companyId);
  if(card){card.classList.add('flash-red');setTimeout(()=>card.classList.remove('flash-red'),600);}
  showToast(profit>0?`✅ מכרת ברווח ₪${fmt(profit)}! (מס: ₪${fmt(tax)})`:`📉 מכרת בהפסד ₪${fmt(Math.abs(profit))}`,profit>=0?'green':'red');
  closeModal();saveGame();renderSidebar();renderStocks();
}

function checkQuest(p){
  if(!p.quest||p.questDone)return;
  if(p.quest.check(p,G)){
    p.questDone=true;p.cash+=p.quest.reward;
    showToast(`🎯 משימה הושלמה! +₪${fmt(p.quest.reward)}`,'yellow');
    G.roundActions[p.id].push({type:'quest',desc:p.quest.desc,reward:p.quest.reward});
  }
}

function buyNewsSubMonthly(){

  G.roundActions[p.id].push({type:'newssub',amount:300});

  saveGame();renderSidebar();openNewsSubModal();
}
function cancelNewsSubMonthly(){

function buyNewsSubOnce(){

  p.cash-=500;p.hasNewsSub=true;
  G.roundActions[p.id].push({type:'newssub',amount:500});

function endTurn(){
  const p=G.players[G.currentPlayer];
  if(G.donePlayers.includes(p.id)){showToast('כבר סיימת!','yellow');return;}
  // Monthly news sub charge
  if(p.newsSubMonthly){p.cash-=300;G.roundActions[p.id].push({type:'newssubbill',amount:300});}
  // one-time resets after round
  p.hasNewsSub=p.newsSubMonthly;
  // Inflation
  const inf=Math.round(p.cash*0.005);
  if(inf>5){p.cash-=inf;showToast(`📉 אינפלציה: -₪${fmt(inf)}`,'yellow');}
  G.donePlayers.push(p.id);
  let nextIdx=-1;
  for(let i=0;i<G.players.length;i++){if(!G.donePlayers.includes(G.players[i].id)){nextIdx=i;break;}}
  if(nextIdx===-1){processRoundEnd();showSummaryScreen();}
  else{G.currentPlayer=nextIdx;showToast(`תור של ${G.players[nextIdx].name}!`,'yellow');renderPlayerTabs();renderSidebar();renderStocks();}
  saveGame();
}

// ROUND END
// ============================================================
function pickNewsForRound(round){
  // Pick 3-5 non-future news
  const pool=NEWS_EVENTS.filter(n=>!n.future);
  const seed=round*7919;
  const shuffled=[...pool].sort((a,b)=>Math.sin(seed+pool.indexOf(a))-Math.sin(seed+pool.indexOf(b)));
  return shuffled.slice(0,3+(round%3));
}

function generateFutureNews(round){
  const pool=NEWS_EVENTS.filter(n=>n.future);
  const pick=pool[Math.floor(Math.random()*pool.length)];
  const triggerRound=round+1+Math.floor(Math.random()*5);
  if(triggerRound<=G.totalRounds){G.futureNews.push({news:pick,triggerRound});}
}

function processRoundEnd(){
  // Save prices before change
  COMPANIES.forEach(c=>{G.lastRoundPrices[c.id]=G.stocks[c.id];});

  const news=pickNewsForRound(G.round);
  // Check if any future news triggers this round
  const triggeredFuture=G.futureNews.filter(fn=>fn.triggerRound===G.round);
  const allNews=[...news,...triggeredFuture.map(fn=>fn.news)];
  G.roundNews=allNews;
  // Remove triggered future news
  G.futureNews=G.futureNews.filter(fn=>fn.triggerRound!==G.round);
  // Generate new future news
  if(G.round<G.totalRounds-1)generateFutureNews(G.round);

  // Apply price changes
  COMPANIES.forEach(company=>{
    let mult=1;
    allNews.forEach(n=>{
      if(n.c===company.id)mult+=n.e;
      if(n.sector&&n.sector===company.category)mult+=n.e*0.5;
      if(!n.c&&!n.sector)mult+=n.e;
    });
    const vol={stable:0.05,volatile:0.12,'very-volatile':0.20}[company.risk];
    mult+=(Math.random()-.5)*2*vol;
    mult=Math.max(0.75,Math.min(1.5,mult));
    G.stocks[company.id]=Math.max(5,Math.round(G.stocks[company.id]*mult));
    G.priceHistory[company.id].push(G.stocks[company.id]);
  });

  // Player end-of-round processing
  G.players.forEach(p=>{
    // Dividends every 3 rounds
    if(G.round%3===0){
      p.portfolio.forEach(h=>{
        const co=COMPANIES.find(c=>c.id===h.id);
        if(co&&co.risk==='stable'){
          const div=Math.round(h.qty*G.stocks[h.id]*0.02);
          if(div>0){p.cash+=div;G.roundActions[p.id].push({type:'dividend',company:co.name,amount:div});}
        }
      });
    }
    // Loan interest every 5 rounds
    if(p.loanAmount>0&&G.round%5===0){
      const int=Math.round(p.loanAmount*0.08);p.cash-=int;
      G.roundActions[p.id].push({type:'loaninterest',amount:int});
    }
    // Insurance crash protection
    if(p.hasInsurance){
      let portfolioLoss=0;
      p.portfolio.forEach(h=>{
        const prev=G.lastRoundPrices[h.id]||G.stocks[h.id];
        const loss=(prev-G.stocks[h.id])*h.qty;
        if(loss>0)portfolioLoss+=loss;
      });
      if(portfolioLoss>500){
        const protection=Math.round(portfolioLoss*0.5);
        p.cash+=protection;
        G.roundActions[p.id].push({type:'insurancepayout',amount:protection});
      }
    }
    // Savings interest 3%
    if(p.savings>0&&p.savingsRoundsLeft>0){
      const int=Math.round(p.savings*0.03);p.savings+=int;
      G.roundActions[p.id].push({type:'savingsinterest',amount:int});
    }
    if(p.savingsRoundsLeft>0)p.savingsRoundsLeft--;
    // Value history
    p.totalValueHistory.push(totalValue(p,G));
    // Reset flags
    p.soldThisRound=false;
    // New quest
    p.quest=QUESTS[Math.floor(Math.random()*QUESTS.length)];p.questDone=false;
  });
  saveGame();
}

        }).join('')}
      </ul>
      ${fomoMsg?`<div class="fomo-tag">${fomoMsg}</div>`:''}
    </div>`;
  }).join('');

  // Next button
  const nextBtn=document.getElementById('next-day-btn');
  if(G.round>=G.totalRounds){
    nextBtn.textContent='🏁 סיום המשחק!';
    nextBtn.onclick=()=>{G.phase='end';showEndScreen();};
  }else{
    nextBtn.textContent='☀️ עבור ליום העסקים הבא';
    nextBtn.onclick=nextDay;
  }
}

function nextDay(){
  G.round++;G.donePlayers=[];G.currentPlayer=0;G.roundActions={};
  G.players.forEach(p=>{G.roundActions[p.id]=[];});
  G.phase='playing';
  saveGame();showGameScreen();
}

// ============================================================
// END SCREEN
// ============================================================
function renderEnd(){
  const sorted=[...G.players].sort((a,b)=>totalValue(b,G)-totalValue(a,G));
  const winner=sorted[0];
  document.getElementById('winner-trophy').textContent=winner.avatar;
  document.getElementById('end-title').textContent=`🏆 ${winner.name} ניצח!`;
  document.getElementById('end-subtitle').textContent=`לאחר ${G.totalRounds} ימי עסקים — הדירוג הסופי:`;
  document.getElementById('end-leaderboard').innerHTML=sorted.map((p,i)=>{
    const tv=totalValue(p,G);const gain=tv-G.startCash;const pct=((gain/G.startCash)*100).toFixed(1);
    return `<div class="leaderboard-row" style="margin-bottom:9px">
      <div style="font-size:1.4rem">${['🥇','🥈','🥉'][i]||(i+1)}</div>
      <div style="font-size:1.8rem">${p.avatar}</div>
      <div style="flex:1;text-align:right"><div style="font-weight:800">${p.name}</div><div style="font-size:0.77rem;color:var(--text2)">₪${fmt(G.startCash)} → ₪${fmt(tv)}</div></div>
      <div style="text-align:left"><div class="mono" style="font-size:1.05rem;color:var(--accent)">₪${fmt(tv)}</div><div class="mono" style="font-size:0.82rem;color:${gain>=0?'var(--green)':'var(--red)'}">${gain>=0?'+':''}${pct}%</div></div>
    </div>`;
  }).join('');
}

// ============================================================
// MODAL
// ============================================================
function openModal(){document.getElementById('modal-overlay').style.display='flex';}
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').style.display='none';}

// ============================================================
// TOAST
// ============================================================
function showToast(msg,type='green'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  c.appendChild(t);setTimeout(()=>t.remove(),3100);
}

// ============================================================
// UTILS
// ============================================================
function fmt(n){return Math.round(n).toLocaleString('he-IL');}

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded',()=>{
  addPlayer();addPlayer();
  const saved=localStorage.getItem('borsa_save');
  if(saved){document.getElementById('load-btn').style.display='inline-flex';document.getElementById('reset-btn').style.display='inline-flex';}
});
</script>
</body>
</html>
