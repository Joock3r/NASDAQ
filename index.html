<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בורסת הילדים 💰</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1a2235;
  --card: #151e2e;
  --card2: #1c2840;
  --border: #2a3a55;
  --accent: #00e5ff;
  --accent2: #7c3aed;
  --green: #00ff88;
  --red: #ff3366;
  --yellow: #ffd700;
  --orange: #ff8c00;
  --text: #e8f0fe;
  --text2: #8899bb;
  --text3: #4a5a7a;
  --glow: 0 0 20px rgba(0,229,255,0.3);
  --glow-g: 0 0 20px rgba(0,255,136,0.3);
  --glow-r: 0 0 20px rgba(255,51,102,0.3);
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* BACKGROUND GRID */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ====== SCREENS ====== */
.screen { display: none; position: relative; z-index: 1; animation: fadeIn 0.4s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ====== SETUP SCREEN ====== */
#setup-screen {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 30px 20px;
}
.logo {
  text-align: center;
  margin-bottom: 40px;
}
.logo h1 {
  font-size: clamp(2.5rem, 6vw, 4rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--accent2), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}
.logo p { color: var(--text2); font-size: 1.1rem; margin-top: 8px; }

.setup-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  width: 100%;
  max-width: 600px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.section-title {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
}

.input-group { margin-bottom: 20px; }
.input-group label { display: block; font-size: 0.9rem; color: var(--text2); margin-bottom: 8px; font-weight: 500; }
.input-group input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 1rem;
  transition: border-color 0.2s, box-shadow 0.2s;
  text-align: right;
}
.input-group input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
}

.players-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.player-row {
  display: flex; gap: 10px; align-items: center;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  animation: slideIn 0.3s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.player-row input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 1rem;
  text-align: right;
}
.player-row input:focus { outline: none; }
.avatar-select { font-size: 1.5rem; cursor: pointer; background: none; border: none; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  border: none; cursor: pointer;
  font-family: 'Heebo', sans-serif;
  font-size: 1rem; font-weight: 700;
  transition: all 0.2s;
  text-decoration: none;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #0099bb);
  color: #000;
  box-shadow: 0 4px 20px rgba(0,229,255,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,229,255,0.4); }
.btn-secondary {
  background: var(--bg3);
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(255,51,102,0.15); color: var(--red); border: 1px solid rgba(255,51,102,0.3); }
.btn-danger:hover { background: rgba(255,51,102,0.25); }
.btn-success { background: linear-gradient(135deg, var(--green), #00aa55); color: #000; box-shadow: 0 4px 20px rgba(0,255,136,0.3); }
.btn-success:hover { transform: translateY(-2px); }
.btn-sm { padding: 8px 16px; font-size: 0.85rem; }
.btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 50%; font-size: 1.1rem; background: rgba(255,51,102,0.15); color: var(--red); border: 1px solid rgba(255,51,102,0.3); }
.btn-icon:hover { background: rgba(255,51,102,0.3); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

.flex { display: flex; }
.flex-center { align-items: center; justify-content: center; }
.gap-10 { gap: 10px; }
.gap-16 { gap: 16px; }
.full-w { width: 100%; }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }

/* ====== GAME SCREEN ====== */
#game-screen { min-height: 100vh; }

.game-header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(10px);
}
.game-title { font-weight: 800; font-size: 1.2rem; color: var(--accent); }
.day-badge {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 0.85rem;
  color: var(--text2);
}
.day-badge span { color: var(--yellow); font-weight: 700; font-family: 'Space Mono', monospace; }

/* PLAYER TABS */
.player-tabs {
  display: flex; gap: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  padding: 0 16px;
}
.player-tab {
  padding: 14px 20px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  font-weight: 600;
  font-size: 0.9rem;
  color: var(--text2);
  transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
}
.player-tab:hover { color: var(--text); }
.player-tab.active {
  border-bottom-color: var(--accent);
  color: var(--accent);
}
.player-tab .tab-value {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  background: var(--bg3);
  padding: 2px 8px;
  border-radius: 10px;
}
.tab-done { font-size: 0.8rem; color: var(--green) !important; }

/* GAME MAIN */
.game-main {
  display: grid;
  grid-template-columns: 300px 1fr;
  min-height: calc(100vh - 110px);
}
@media (max-width: 900px) {
  .game-main { grid-template-columns: 1fr; }
  .sidebar { border-left: none; border-bottom: 1px solid var(--border); }
}

/* SIDEBAR */
.sidebar {
  background: var(--card);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
}

.player-profile {
  text-align: center;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.player-avatar { font-size: 3rem; margin-bottom: 8px; }
.player-name-big { font-size: 1.3rem; font-weight: 800; }
.player-cash {
  font-family: 'Space Mono', monospace;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--green);
  margin: 4px 0;
}
.player-cash-label { font-size: 0.75rem; color: var(--text2); }

.stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--bg3);
  font-size: 0.85rem;
}
.stat-label { color: var(--text2); }
.stat-val { font-family: 'Space Mono', monospace; font-weight: 700; }
.stat-val.green { color: var(--green); }
.stat-val.red { color: var(--red); }
.stat-val.yellow { color: var(--yellow); }

/* DIVERSIFICATION METER */
.div-meter-wrap { margin-top: 20px; }
.div-meter-bar {
  height: 8px;
  background: var(--bg3);
  border-radius: 4px;
  overflow: hidden;
  margin: 8px 0;
}
.div-meter-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* ACTIONS PANEL */
.sidebar-actions { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }

/* QUEST CARD */
.quest-card {
  background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(124,58,237,0.05));
  border: 1px solid rgba(124,58,237,0.4);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-top: 16px;
}
.quest-title { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); margin-bottom: 6px; font-weight: 700; }
.quest-desc { font-size: 0.85rem; color: var(--text); margin-bottom: 8px; }
.quest-reward { font-size: 0.8rem; color: var(--yellow); }

/* NEWS TICKER */
.news-ticker-wrap {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  overflow: hidden;
  position: relative;
}
.news-ticker {
  display: flex; gap: 40px;
  animation: ticker 30s linear infinite;
  white-space: nowrap;
}
@keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.news-item { font-size: 0.8rem; color: var(--text2); }
.news-item .tag { color: var(--accent); font-weight: 700; margin-left: 6px; }
.news-item .up { color: var(--green); }
.news-item .down { color: var(--red); }

/* MARKET GRID */
.market-area { padding: 20px; overflow-y: auto; }
.market-search {
  display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}
.market-search input {
  flex: 1; min-width: 180px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 0.9rem;
  text-align: right;
}
.market-search input:focus { outline: none; border-color: var(--accent); }

.filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 0.8rem;
  cursor: pointer;
  background: var(--bg2);
  color: var(--text2);
  transition: all 0.2s;
}
.pill.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
.pill:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

.stocks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

/* STOCK CARD */
.stock-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.stock-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.stock-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
.stock-card:hover::before { opacity: 1; }
.stock-card.owned { border-color: rgba(0,255,136,0.4); }
.stock-card.owned::before { opacity: 1; background: linear-gradient(90deg, transparent, var(--green), transparent); }

.stock-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.stock-emoji { font-size: 2rem; }
.stock-name { font-weight: 800; font-size: 0.95rem; margin-bottom: 2px; }
.stock-category { font-size: 0.7rem; color: var(--text2); }
.stock-risk {
  font-size: 0.65rem;
  padding: 3px 8px;
  border-radius: 10px;
  font-weight: 700;
  letter-spacing: 1px;
}
.risk-stable { background: rgba(0,255,136,0.15); color: var(--green); }
.risk-volatile { background: rgba(255,140,0,0.15); color: var(--orange); }
.risk-very-volatile { background: rgba(255,51,102,0.15); color: var(--red); }

.stock-price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.stock-price {
  font-family: 'Space Mono', monospace;
  font-size: 1.3rem;
  font-weight: 700;
}
.stock-change {
  font-family: 'Space Mono', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 8px;
}
.change-up { background: rgba(0,255,136,0.15); color: var(--green); }
.change-down { background: rgba(255,51,102,0.15); color: var(--red); }
.change-neutral { background: rgba(255,215,0,0.1); color: var(--yellow); }

.mini-chart { height: 40px; position: relative; margin-bottom: 10px; }
.mini-chart canvas { width: 100% !important; height: 40px !important; }

.stock-owned-badge {
  font-size: 0.75rem;
  color: var(--green);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 4px;
}

.stock-actions { display: flex; gap: 8px; }
.buy-btn {
  flex: 1; padding: 8px;
  background: rgba(0,255,136,0.1);
  border: 1px solid rgba(0,255,136,0.3);
  border-radius: 8px;
  color: var(--green);
  font-family: 'Heebo', sans-serif;
  font-weight: 700; font-size: 0.85rem;
  cursor: pointer; transition: all 0.2s;
}
.buy-btn:hover { background: rgba(0,255,136,0.2); }
.sell-btn {
  flex: 1; padding: 8px;
  background: rgba(255,51,102,0.1);
  border: 1px solid rgba(255,51,102,0.3);
  border-radius: 8px;
  color: var(--red);
  font-family: 'Heebo', sans-serif;
  font-weight: 700; font-size: 0.85rem;
  cursor: pointer; transition: all 0.2s;
}
.sell-btn:hover { background: rgba(255,51,102,0.2); }
.sell-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* FLASH ANIMATIONS */
@keyframes flashGreen { 0%, 100% { background: var(--card); } 50% { background: rgba(0,255,136,0.2); } }
@keyframes flashRed { 0%, 100% { background: var(--card); } 50% { background: rgba(255,51,102,0.2); } }
.flash-green { animation: flashGreen 0.6s ease; }
.flash-red { animation: flashRed 0.6s ease; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 30px;
  max-width: 500px; width: 100%;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  animation: modalIn 0.3s ease;
  max-height: 90vh; overflow-y: auto;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
.modal h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.modal-info { background: var(--bg2); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 16px; }
.modal-info .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--bg3); font-size: 0.9rem; }
.modal-info .row:last-child { border: none; }

.qty-control { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
.qty-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.qty-btn:hover { border-color: var(--accent); color: var(--accent); }
.qty-display {
  font-family: 'Space Mono', monospace;
  font-size: 1.5rem; font-weight: 700;
  flex: 1; text-align: center;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px;
}
.total-cost {
  font-family: 'Space Mono', monospace;
  font-size: 1.1rem; font-weight: 700;
  text-align: center;
  padding: 10px;
  border-radius: var(--radius-sm);
  background: var(--bg2);
  border: 1px solid var(--border);
  margin-bottom: 16px;
}
.tax-notice {
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 0.8rem;
  color: var(--yellow);
  margin-bottom: 16px;
}

/* ROUND SUMMARY */
#summary-screen { min-height: 100vh; padding: 30px 20px; max-width: 900px; margin: 0 auto; }
.summary-header { text-align: center; margin-bottom: 30px; }
.summary-header h1 { font-size: 2rem; font-weight: 900; }
.summary-header p { color: var(--text2); margin-top: 6px; }

.news-event-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
.news-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  display: flex; align-items: center; gap: 16px;
}
.news-card .news-icon { font-size: 2rem; }
.news-card .news-body { flex: 1; }
.news-card .news-headline { font-weight: 700; margin-bottom: 4px; }
.news-card .news-effect { font-size: 0.85rem; color: var(--text2); }
.news-card .news-pct { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 1.1rem; }

.players-summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  margin-bottom: 30px;
}
.player-summary-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.player-summary-card.mvp {
  border-color: var(--yellow);
  box-shadow: 0 0 30px rgba(255,215,0,0.2);
}
.mvp-badge {
  position: absolute; top: 12px; left: 12px;
  background: var(--yellow);
  color: #000;
  font-size: 0.65rem;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 10px;
  letter-spacing: 1px;
}
.ps-avatar { font-size: 2.5rem; margin-bottom: 8px; }
.ps-name { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; }
.ps-total {
  font-family: 'Space Mono', monospace;
  font-size: 1.4rem; font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
}
.ps-change {
  font-family: 'Space Mono', monospace;
  font-size: 0.9rem; font-weight: 700;
  padding: 4px 10px; border-radius: 8px;
  display: inline-block; margin-bottom: 12px;
}

.actions-log { list-style: none; }
.action-item {
  padding: 6px 0;
  border-bottom: 1px solid var(--bg3);
  font-size: 0.8rem;
  color: var(--text2);
  display: flex; justify-content: space-between;
}
.action-item:last-child { border: none; }
.action-item .alist-label { }
.action-item .alist-val { font-family: 'Space Mono', monospace; font-size: 0.75rem; }

.fomo-tag {
  margin-top: 10px;
  background: rgba(255,140,0,0.15);
  border: 1px solid rgba(255,140,0,0.3);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 0.78rem;
  color: var(--orange);
}

.leaderboard-section { margin-bottom: 30px; }
.leaderboard-row {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  transition: all 0.2s;
}
.leaderboard-row:hover { border-color: var(--accent); }
.rank-num {
  font-family: 'Space Mono', monospace;
  font-size: 1.2rem; font-weight: 700;
  color: var(--text3);
  width: 30px; text-align: center;
}
.rank-num.gold { color: var(--yellow); }
.rank-num.silver { color: #aaa; }
.rank-num.bronze { color: #cd7f32; }

const AVATARS = ['😎','🦸','🧠','🦊','🐯','🦁','🐧','🦅','🐬','🦊','🎩','👑'];

// ============================================================
// GAME STATE
// ============================================================
let G = {
  players: [],
  round: 1,
  totalRounds: 10,
  startCash: 10000,
  stocks: {},       // stockId -> current price
  priceHistory: {}, // stockId -> array of prices
  currentPlayer: 0,
  donePlayers: [],
  roundNews: [],
  roundActions: {}, // playerId -> []
  phase: 'playing', // playing | summary | end
};

function totalValue(player, gs) {
  let v = player.cash;
  player.portfolio.forEach(h => { v += h.qty * (gs.stocks[h.id] || 0); });
  v += player.savings;
  v += player.loanAmount * -1; // actually loan is negative
  return v;
}

// SETUP
// ============================================================
let playerCount = 0;
function addPlayer() {
  const avatarIdx = playerCount % AVATARS.length;
  const avatar = AVATARS[avatarIdx];
  playerCount++;
  const id = 'p' + playerCount;
  const div = document.createElement('div');
  div.className = 'player-row';
  div.id = 'player-row-' + id;
  div.innerHTML = `
    <span style="font-size:1.5rem">${avatar}</span>
    <input type="text" placeholder="שם שחקן ${playerCount}" id="pname-${id}" value="שחקן ${playerCount}">
    <button class="btn btn-icon" onclick="removePlayer('${id}')">✕</button>
  `;
  document.getElementById('players-list').appendChild(div);
}

function removePlayer(id) {
  const el = document.getElementById('player-row-' + id);
  if (el) el.remove();
}

function startGame() {
  const rows = document.querySelectorAll('.player-row');
  if (rows.length < 1) { showToast('הוסף לפחות שחקן אחד!', 'red'); return; }
  
  const cash = parseInt(document.getElementById('start-cash').value) || 10000;
  const rounds = parseInt(document.getElementById('num-rounds').value) || 10;
  
  const players = [];
  rows.forEach((row, i) => {
    const inp = row.querySelector('input[type="text"]');
    const name = inp ? inp.value.trim() || ('שחקן ' + (i+1)) : 'שחקן ' + (i+1);
    const avatarSpan = row.querySelector('span');
    const avatar = avatarSpan ? avatarSpan.textContent : AVATARS[i % AVATARS.length];
    players.push({
      id: 'p' + (i+1),
      name,
      avatar,
      cash,
      portfolio: [],         // {id, qty, avgCost}
      savings: 0,
      savingsRoundsLeft: 0,
      loanAmount: 0,
      loanInterestDue: 0,
      hasInsurance: false,
      hasNewsSub: false,
      newsSubRoundsLeft: 0,
      soldThisRound: false,
      quest: null,
      questDone: false,
      totalValueHistory: [cash],
    });
  });
  
  G.players = players;
  G.round = 1;
  G.totalRounds = rounds;
  G.startCash = cash;
  G.currentPlayer = 0;
  G.donePlayers = [];
  G.roundActions = {};
  players.forEach(p => { G.roundActions[p.id] = []; });
  
  // Init stock prices
  COMPANIES.forEach(c => {
    G.stocks[c.id] = c.basePrice;
    G.priceHistory[c.id] = [c.basePrice];
  });
  
  // Assign quests
  assignQuests();
  
  G.phase = 'playing';
  saveGame();
  showGameScreen();
}

function assignQuests() {
  const shuffled = [...QUESTS].sort(() => Math.random() - 0.5);
  G.players.forEach((p, i) => {
    p.quest = shuffled[i % shuffled.length];
    p.questDone = false;
  });
}

// ============================================================
// LOAD / SAVE
// ============================================================
function saveGame() {
  try { localStorage.setItem('borsa_save', JSON.stringify(G)); } catch(e) {}
}

function loadGame() {
  const raw = localStorage.getItem('borsa_save');
  if (!raw) return;
  G = JSON.parse(raw);
  // Restore quest functions (they don't serialize)
  G.players.forEach(p => {
    if (p.quest) {
      const match = QUESTS.find(q => q.desc === p.quest.desc);
      if (match) p.quest = match;
    }
  });
  if (G.phase === 'playing') showGameScreen();
  else if (G.phase === 'summary') showSummaryScreen();
  else showEndScreen();
}

function resetSave() {
  if (!confirm('בטוח שרוצה למחוק את השמירה?')) return;
  localStorage.removeItem('borsa_save');
  location.reload();
}

      ${holding ? `<div class="stock-owned-badge">✓ ברשותך: ${holding.qty} מניות</div>` : ''}
      <div class="stock-actions">

    `;

  });
}

function drawMiniChart(id) {
  const canvas = document.getElementById('chart-' + id);
  if (!canvas) return;
  const hist = G.priceHistory[id] || [];
  if (hist.length < 2) { return; }
  
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || 240;
  canvas.height = 40;
  
  const min = Math.min(...hist);
  const max = Math.max(...hist);
  const range = max - min || 1;
  const w = canvas.width, h = canvas.height;
  const last = hist[hist.length - 1];
  const first = hist[0];
  const color = last >= first ? '#00ff88' : '#ff3366';
  
  ctx.clearRect(0, 0, w, h);
  ctx.beginPath();
  hist.forEach((p, i) => {
    const x = (i / (hist.length - 1)) * w;
    const y = h - ((p - min) / range) * (h - 4) - 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Fill
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  ctx.fillStyle = color + '22';
  ctx.fill();
}

      <div class="qty-control">

        <button class="qty-btn" onclick="changeBuyQty('${companyId}', 1)">+</button>
      </div>
      <div class="total-cost" style="color:${canAfford ? 'var(--green)' : 'var(--red)'}">
        ${canAfford ? '✓' : '✗'} סה"כ: ₪${fmt(total)}

      </div>
    `.replace('{{risk}}', {stable:'יציב',volatile:'תנודתי','very-volatile':'תנודתי מאוד'}[company.risk]);
  }
  
  window._buyQty = qty;
  window._buyCompanyId = companyId;
  window.changeBuyQty = (id, delta) => {
    window._buyQty = Math.max(1, window._buyQty + delta);

    if (window._buyQty > 1 && total > p2.cash) window._buyQty--;

    buyStock(id, qty2);
    closeModal();
  };
  
  render();
  openModal();
}

      </div>
    `;
  }
  
  window._sellQty = qty;
  window.changeSellQty = (id, delta) => {
    const h = G.players[G.currentPlayer].portfolio.find(x => x.id === id);
    window._sellQty = Math.max(1, Math.min(h.qty, window._sellQty + delta));
    qty = window._sellQty;
    render();
  };
  window.executeSell = (id) => {
    sellStock(id, window._sellQty);
    closeModal();
  };
  
  render();
  openModal();
}

// TRANSACTIONS
// ============================================================
function buyStock(companyId, qty) {
  const p = G.players[G.currentPlayer];
  const price = G.stocks[companyId];
  const total = qty * price;
  
  if (p.cash < total) { showToast('אין מספיק מזומן!', 'red'); return; }
  
  p.cash -= total;
  
  const existing = p.portfolio.find(h => h.id === companyId);
  if (existing) {
    const newAvg = ((existing.avgCost * existing.qty) + (price * qty)) / (existing.qty + qty);
    existing.avgCost = newAvg;
    existing.qty += qty;
  } else {
    p.portfolio.push({ id: companyId, qty, avgCost: price });
  }
  
  const company = COMPANIES.find(c => c.id === companyId);
  G.roundActions[p.id].push({ type:'buy', company:company.name, qty, price, total });
  
  // Check quest
  checkQuest(p);
  
  const card = document.getElementById('card-' + companyId);
  if (card) card.classList.add('flash-green');
  setTimeout(() => { if (card) card.classList.remove('flash-green'); }, 600);
  
  showToast(`✅ קנית ${qty} מניות של ${company.name}!`, 'green');
  saveGame();
  renderSidebar();
  renderStocks();
}

function sellStock(companyId, qty) {
  const p = G.players[G.currentPlayer];
  const price = G.stocks[companyId];
  const holding = p.portfolio.find(h => h.id === companyId);
  if (!holding || holding.qty < qty) { showToast('אין מספיק מניות!', 'red'); return; }
  
  const total = qty * price;
  const cost = qty * holding.avgCost;
  const profit = total - cost;
  const tax = profit > 0 ? Math.round(profit * 0.1) : 0;
  const net = total - tax;
  
  p.cash += net;
  holding.qty -= qty;
  if (holding.qty === 0) p.portfolio = p.portfolio.filter(h => h.id !== companyId);
  
  p.soldThisRound = true;
  
  const company = COMPANIES.find(c => c.id === companyId);
  G.roundActions[p.id].push({ type:'sell', company:company.name, qty, price, total, profit, tax });
  
  const card = document.getElementById('card-' + companyId);
  if (card) card.classList.add('flash-red');
  setTimeout(() => { if (card) card.classList.remove('flash-red'); }, 600);
  
  const msg = profit > 0 ? `✅ מכרת ברווח של ₪${fmt(profit)}! (מס: ₪${fmt(tax)})` : `📉 מכרת בהפסד של ₪${fmt(Math.abs(profit))}`;
  showToast(msg, profit >= 0 ? 'green' : 'red');
  saveGame();
  renderSidebar();
  renderStocks();
}

function checkQuest(p) {
  if (!p.quest || p.questDone) return;
  if (p.quest.check(p, G)) {
    p.questDone = true;
    p.cash += p.quest.reward;
    showToast(`🎯 משימה הושלמה! קיבלת ₪${fmt(p.quest.reward)}!`, 'yellow');
    G.roundActions[p.id].push({ type:'quest', desc:p.quest.desc, reward:p.quest.reward });
  }
}

function endTurn() {
  const p = G.players[G.currentPlayer];
  if (G.donePlayers.includes(p.id)) { showToast('כבר סיימת את תורך!', 'yellow'); return; }
  
  // Apply inflation (0.5% on uninvested cash)
  const inflation = Math.round(p.cash * 0.005);
  if (inflation > 0) {
    p.cash -= inflation;
    if (inflation > 5) showToast(`📉 אינפלציה: איבדת ₪${fmt(inflation)} על מזומן לא מושקע`, 'yellow');
  }
  
  G.donePlayers.push(p.id);
  
  // Find next not-done player
  let nextIdx = -1;
  for (let i = 0; i < G.players.length; i++) {
    if (!G.donePlayers.includes(G.players[i].id)) { nextIdx = i; break; }
  }
  
  if (nextIdx === -1) {
    // All done - go to summary
    processRoundEnd();
    showSummaryScreen();
  } else {
    G.currentPlayer = nextIdx;
    showToast(`תור של ${G.players[nextIdx].name}!`, 'yellow');
    renderPlayerTabs();
    renderSidebar();
    renderStocks();
  }
  
  saveGame();
}

// ============================================================
// ROUND END PROCESSING
// ============================================================
function generateNewsForRound(round) {
  const seed = round * 7919;
  const shuffled = [...NEWS_EVENTS].sort((a,b) => {
    const ra = Math.sin(seed + NEWS_EVENTS.indexOf(a)) * 10000;
    const rb = Math.sin(seed + NEWS_EVENTS.indexOf(b)) * 10000;
    return (ra - Math.floor(ra)) - (rb - Math.floor(rb));
  });
  return shuffled.slice(0, 3 + (round % 2));
}

function processRoundEnd() {
  const news = generateNewsForRound(G.round);
  G.roundNews = news;
  
  // Update stock prices
  COMPANIES.forEach(company => {
    let changeMultiplier = 1;
    
    // News effects
    news.forEach(n => {
      if (n.company === company.id) changeMultiplier += n.effect;
    });
    
    // Random fluctuation based on risk
    const volatility = { stable:0.05, volatile:0.12, 'very-volatile':0.20 }[company.risk];
    const rand = (Math.random() - 0.5) * 2 * volatility;
    changeMultiplier += rand;
    
    // Clamp
    changeMultiplier = Math.max(0.7, Math.min(1.5, changeMultiplier));
    
    const newPrice = Math.max(5, Math.round(G.stocks[company.id] * changeMultiplier));
    G.stocks[company.id] = newPrice;
    G.priceHistory[company.id].push(newPrice);
  });
  
  // Pay dividends to stable stock holders
  G.players.forEach(p => {
    if (G.round % 3 === 0) {
      p.portfolio.forEach(h => {
        const company = COMPANIES.find(c => c.id === h.id);
        if (company && company.risk === 'stable') {
          const dividend = Math.round(h.qty * G.stocks[h.id] * 0.02);
          if (dividend > 0) {
            p.cash += dividend;
            G.roundActions[p.id].push({ type:'dividend', company:company.name, amount:dividend });
          }
        }
      });
    }
    
    // Loan interest
    if (p.loanAmount > 0 && G.round % 5 === 0) {
      const interest = Math.round(p.loanAmount * 0.08);
      p.cash -= interest;
      G.roundActions[p.id].push({ type:'loaninterest', amount:interest });
    }
    
    // Savings unlock
    if (p.savingsRoundsLeft > 0) p.savingsRoundsLeft--;
    
    // News sub
    if (p.hasNewsSub && p.newsSubRoundsLeft > 0) p.newsSubRoundsLeft--;
    if (p.newsSubRoundsLeft === 0) p.hasNewsSub = false;
    
    // Track total value history
    p.totalValueHistory.push(totalValue(p, G));
    
    // Reset per-round flags
    p.soldThisRound = false;
    
    // Assign new quest
    const newQuest = QUESTS[Math.floor(Math.random() * QUESTS.length)];
    p.quest = newQuest;
    p.questDone = false;
  });
  
  saveGame();
}

    return `
      <div class="news-card">
        <div class="news-icon">${n.icon}</div>
        <div class="news-body">
          <div class="news-headline">${n.headline}</div>
          <div class="news-effect">${company ? company.name : 'כל השוק'}</div>
        </div>
        <div class="news-pct ${effectClass}">${n.effect > 0 ? '+' : ''}${effectPct}%</div>
      </div>
    `;
  }).join('');
  
  // Leaderboard
  const sorted = [...G.players].sort((a,b) => totalValue(b,G) - totalValue(a,G));
  const medals = ['gold','silver','bronze'];
  document.getElementById('leaderboard').innerHTML = sorted.map((p, i) => {
    const tv = totalValue(p, G);
    const prev = p.totalValueHistory.length >= 2 ? p.totalValueHistory[p.totalValueHistory.length - 2] : G.startCash;
    const change = tv - prev;
    const changePct = ((change / prev) * 100).toFixed(1);
    return `
      <div class="leaderboard-row">
        <div class="rank-num ${medals[i]||''}">${['🥇','🥈','🥉'][i] || (i+1)}</div>
        <div class="lb-av">${p.avatar}</div>
        <div class="lb-name">${p.name}</div>
        <div class="lb-val" style="color:${change>=0?'var(--green)':'var(--red)'}">${change>=0?'+':''}${changePct}%</div>
        <div class="lb-val" style="color:var(--accent)">₪${fmt(tv)}</div>
      </div>
    `;
  }).join('');
  
  // Find MVP
  const mvpPlayer = G.players.reduce((best, p) => {
    const tv = totalValue(p, G);
    const prev = p.totalValueHistory.length >= 2 ? p.totalValueHistory[p.totalValueHistory.length - 2] : G.startCash;
    const pct = (tv - prev) / prev;
    const bestPrev = best.totalValueHistory.length >= 2 ? best.totalValueHistory[best.totalValueHistory.length - 2] : G.startCash;
    const bestPct = (totalValue(best, G) - bestPrev) / bestPrev;
    return pct > bestPct ? p : best;
  });
  
  // Player summary cards
  document.getElementById('players-summary').innerHTML = G.players.map(p => {
    const tv = totalValue(p, G);
    const prev = p.totalValueHistory.length >= 2 ? p.totalValueHistory[p.totalValueHistory.length - 2] : G.startCash;
    const change = tv - prev;
    const changePct = ((change / prev) * 100).toFixed(1);
    const isMvp = p.id === mvpPlayer.id;
    const actions = G.roundActions[p.id] || [];
    
    // FOMO detection - find if player sold before a surge
    let fomoMsg = '';
    actions.forEach(a => {
      if (a.type === 'sell') {
        const curPrice = G.stocks[a.company];
        const soldFor = a.price;
        if (curPrice && curPrice > soldFor * 1.1) {
          fomoMsg = `😰 מכרת את ${a.company} - ואז היא עלתה! FOMO!`;
        }
      }
    });
    
    return `
      <div class="player-summary-card ${isMvp ? 'mvp' : ''}">
        ${isMvp ? '<div class="mvp-badge">⭐ MVP יום</div>' : ''}
        <div class="ps-avatar">${p.avatar}</div>
        <div class="ps-name">${p.name}</div>
        <div class="ps-total">₪${fmt(tv)}</div>
        <div class="ps-change ${change >= 0 ? 'change-up' : 'change-down'}">${change >= 0 ? '+' : ''}${changePct}% היום</div>
        <ul class="actions-log">
          ${actions.length === 0 ? '<li class="action-item"><span class="alist-label">לא עשה כלום...</span></li>' : ''}
          ${actions.slice(0, 5).map(a => {
            const label = {
              buy: `📈 קנה ${a.qty}× ${a.company}`,
              sell: `📉 מכר ${a.qty}× ${a.company}`,
              deposit: `🏦 הפקיד לחיסכון`,
              withdraw: `💰 משך מחיסכון`,
              loan: `💳 לקח הלוואה`,
              repay: `✅ פרע הלוואה`,
              insurance: `🛡️ קנה ביטוח`,
              newssub: `📰 קנה מינוי חדשות`,
              dividend: `💰 דיבידנד: ${a.company}`,
              loaninterest: `💸 ריבית הלוואה`,
              quest: `🎯 משימה הושלמה!`,
            }[a.type] || a.type;
            const val = a.total ? `₪${fmt(a.total)}` : a.amount ? `₪${fmt(a.amount)}` : '';
            return `<li class="action-item"><span class="alist-label">${label}</span><span class="alist-val">${val}</span></li>`;
          }).join('')}
        </ul>
        ${fomoMsg ? `<div class="fomo-tag">${fomoMsg}</div>` : ''}
      </div>
    `;
  }).join('');
  
  // Next day or end
  const nextBtn = document.getElementById('next-day-btn');
  if (G.round >= G.totalRounds) {
    nextBtn.textContent = '🏁 סיום המשחק!';
    nextBtn.onclick = () => { G.phase = 'end'; showEndScreen(); };
  } else {
    nextBtn.textContent = '☀️ עבור ליום העסקים הבא';
    nextBtn.onclick = nextDay;
  }
}

function nextDay() {
  G.round++;
  G.donePlayers = [];
  G.currentPlayer = 0;
  G.roundActions = {};
  G.players.forEach(p => { G.roundActions[p.id] = []; });
  G.phase = 'playing';
  document.getElementById('current-day-label').textContent = G.round;
  saveGame();
  showGameScreen();
}

// ============================================================
// END SCREEN
// ============================================================
function renderEnd() {
  const sorted = [...G.players].sort((a,b) => totalValue(b,G) - totalValue(a,G));
  const winner = sorted[0];
  
  document.getElementById('winner-trophy').textContent = winner.avatar;
  document.getElementById('end-title').textContent = `🏆 ${winner.name} ניצח!`;
  document.getElementById('end-subtitle').textContent = `לאחר ${G.totalRounds} ימי עסקים, הנה הדירוג הסופי:`;
  
  document.getElementById('end-leaderboard').innerHTML = sorted.map((p, i) => {
    const tv = totalValue(p, G);
    const gain = tv - G.startCash;
    const pct = ((gain / G.startCash) * 100).toFixed(1);
    const medals = ['🥇','🥈','🥉'];
    return `
      <div class="leaderboard-row" style="margin-bottom:10px">
        <div class="rank-num" style="font-size:1.5rem">${medals[i] || (i+1)}</div>
        <div style="font-size:2rem">${p.avatar}</div>
        <div style="flex:1;text-align:right">
          <div style="font-weight:800">${p.name}</div>
          <div style="font-size:0.8rem;color:var(--text2)">₪${fmt(G.startCash)} → ₪${fmt(tv)}</div>
        </div>
        <div style="text-align:left">
          <div class="mono" style="font-size:1.1rem;color:var(--accent)">₪${fmt(tv)}</div>
          <div class="mono" style="font-size:0.85rem;color:${gain>=0?'var(--green)':'var(--red)'}">${gain>=0?'+':''}${pct}%</div>
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
// NEWS TICKER
// ============================================================
function updateNewsTicker() {
  const news = G.roundNews.length > 0 ? G.roundNews : generateNewsForRound(G.round);
  const ticker = document.getElementById('news-ticker');
  const items = [...news, ...news]; // double for seamless loop
  ticker.innerHTML = items.map(n => `
    <span class="news-item">
      ${n.icon} <strong>${n.headline}</strong>
      <span class="${n.effect > 0 ? 'up' : n.effect < 0 ? 'down' : ''}">${n.effect !== 0 ? (n.effect > 0 ? '▲' : '▼') + Math.abs((n.effect*100).toFixed(0)) + '%' : ''}</span>
    </span>
  `).join('');
}

// ============================================================
// MODAL
// ============================================================
function openModal() {
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').style.display = 'none';
  }
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = 'green') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { toast.remove(); }, 3100);
}

// ============================================================
// UTILS
// ============================================================
function fmt(n) {
  const num = Math.round(n);
  return num.toLocaleString('he-IL');
}

// ============================================================
// LOGO MANAGER
// ============================================================
function openLogoManager() {
  const grid = COMPANIES.map(c => {
    const hasLogo = !!companyLogos[c.id];
    return `
      <div class="logo-item" onclick="triggerLogoUpload('${c.id}')">
        <div class="logo-preview">
          ${hasLogo ? `<img src="${companyLogos[c.id]}" alt="${c.name}">` : c.emoji}
        </div>
        <div class="logo-name">${c.name}</div>
        <div class="logo-upload-hint">${hasLogo ? '✅ לחץ להחלפה' : '📁 לחץ להעלאה'}</div>
        ${hasLogo ? `<button class="btn btn-danger btn-sm" style="margin-top:6px;padding:4px 10px;font-size:0.7rem" onclick="removeLogo(event,'${c.id}')">✕ הסר</button>` : ''}
      </div>
    `;
  }).join('');

  document.getElementById('modal-content').innerHTML = `
    <h2>🖼️ ניהול לוגואים לחברות</h2>
    <p style="color:var(--text2);font-size:0.85rem;margin-bottom:14px">לחץ על חברה להעלאת לוגו. אם לא הועלה לוגו — יוצג האייקון הרגיל.</p>
    <div class="logo-manager-grid">${grid}</div>
    <input type="file" id="logo-file-input" accept="image/*" style="display:none" onchange="handleLogoFile(event)">
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-danger btn-sm" onclick="clearAllLogos()">🗑️ מחק כל הלוגואים</button>
      <button class="btn btn-secondary" onclick="closeModal()">סגור</button>
    </div>
  `;
  openModal();
}

let _currentLogoCompanyId = null;
function triggerLogoUpload(companyId) {
  _currentLogoCompanyId = companyId;
  document.getElementById('logo-file-input').value = '';
  document.getElementById('logo-file-input').click();
}

function handleLogoFile(event) {
  const file = event.target.files[0];
  if (!file || !_currentLogoCompanyId) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    companyLogos[_currentLogoCompanyId] = e.target.result;
    saveLogos();
    showToast('✅ לוגו הועלה בהצלחה!', 'green');
    openLogoManager(); // re-render
  };
  reader.readAsDataURL(file);
}

function removeLogo(event, companyId) {
  event.stopPropagation();
  delete companyLogos[companyId];
  saveLogos();
  openLogoManager();
}

function clearAllLogos() {
  if (!confirm('למחוק את כל הלוגואים?')) return;
  companyLogos = {};
  saveLogos();
  openLogoManager();
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  // Add default 2 players
  addPlayer();
  addPlayer();
  
  // Check for saved game
  const saved = localStorage.getItem('borsa_save');
  if (saved) {
    document.getElementById('load-btn').style.display = 'inline-flex';
    document.getElementById('reset-btn').style.display = 'inline-flex';
  }
});
</script>
